apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vote
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: vote
  namespaceSelector:
    matchNames:
      - example-voting-app
  endpoints:
    - port: vote-service
      path: /metrics
      interval: 15s